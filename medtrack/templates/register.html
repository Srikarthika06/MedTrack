{% extends "base.html" %}

{% block title %}Register | MedTrack{% endblock %}

{% block content %}
<section class="card auth-card">
    <h2>Create Your Account</h2>
    <p class="muted">Join our healthcare platform to connect with doctors and manage your health.</p>

    <form method="POST">
        <div class="role-tabs">
            <label class="role-option">
                <input type="radio" name="role" value="Patient" checked>
                <strong>Patient</strong>
                <small>Book appointments and consult with doctors</small>
            </label>
            <label class="role-option">
                <input type="radio" name="role" value="Doctor">
                <strong>Doctor</strong>
                <small>Provide consultations and diagnoses</small>
            </label>
        </div>

        <div class="form-grid">
            <label>Full Name
                <input type="text" name="name" required>
            </label>
            <label>Email Address
                <input type="email" name="email" required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <label>Phone Number
                <input type="text" name="phone" required>
            </label>
        </div>

        <button type="submit">Register</button>
    </form>

    <p class="muted" style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="/login">Login here</a>
    </p>
</section>
{% endblock %}
