{% extends "base.html" %}

{% block title %}Login | MedTrack{% endblock %}

{% block content %}
<section class="card auth-card">
    <h2>Login to Your Account</h2>
    <p class="muted">Access your healthcare dashboard to manage appointments.</p>

    <form method="POST">
        <div class="role-tabs">
            <label class="role-option">
                <input type="radio" name="role" value="Patient" checked>
                <strong>Patient</strong>
            </label>
            <label class="role-option">
                <input type="radio" name="role" value="Doctor">
                <strong>Doctor</strong>
            </label>
        </div>

        <label>Email Address
            <input type="email" name="email" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>

        <button type="submit">Login</button>
    </form>

    <p class="muted" style="text-align: center; margin-top: 20px;">
        Don't have an account? <a href="/register">Register here</a>
    </p>
</section>
{% endblock %}
