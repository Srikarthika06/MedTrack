<!DOCTYPE html>
<html>
<head>
    <title>Search Appointments</title>
</head>
<body>
    <h2>Search Appointments</h2>

    <form method="POST">
        <input type="text" name="search_term" placeholder="Search by doctor, date, or status" required>
        <button type="submit">Search</button>
    </form>

    <br>

    {% if results %}
        <table border="1">
            <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Status</th>
            </tr>

            {% for item in results %}
            <tr>
                <td>{{ item.patient }}</td>
                <td>{{ item.doctor }}</td>
                <td>{{ item.date }}</td>
                <td>{{ item.status }}</td>
            </tr>
            {% endfor %}
        </table>
    {% endif %}

    <br>
    <a href="/login">Back to Dashboard</a>
</body>
</html>
