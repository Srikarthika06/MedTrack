<!DOCTYPE html>
<html>
<head>
<title>Search Appointments</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>
<body>

<div class="navbar">
<h2>Search Appointments</h2>
<a href="/login">Dashboard</a>
</div>

<div class="container">
<div class="card">

<form method="POST">
<input type="text" name="search_term" placeholder="Search by doctor, date, or status" required>
<button type="submit">Search</button>
</form>

{% if results %}
<table>
<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Status</th>
</tr>

{% for item in results %}
<tr>
<td>{{ item.patient }}</td>
<td>{{ item.doctor }}</td>
<td>{{ item.date }}</td>
<td>{{ item.status }}</td>
</tr>
{% endfor %}
</table>
{% endif %}

</div>
</div>

</body>
</html>
